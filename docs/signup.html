<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PGConnect Demo Signup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="auth-page">
  <nav class="navbar navbar-expand-lg navbar-light fixed-top app-nav">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="./index.html">
        <span class="badge rounded-circle bg-primary text-white fw-bold">PG</span>
        <span>PGCONNECT</span>
      </a>
      <div class="d-flex gap-2">
        <a href="./index.html" class="btn btn-outline-secondary btn-sm px-3">Home</a>
        <a href="./login.html" class="btn btn-primary btn-sm px-3">Login</a>
      </div>
    </div>
  </nav>

  <section class="section-shell auth-shell">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
          <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="card-body p-5">
              <div class="text-center mb-4">
                <div class="eyebrow"><span></span> PGConnect Demo</div>
                <h2 class="hero-title mt-2 mb-1 auth-title">Create your account</h2>
                <p class="small text-muted mb-0">Frontend-only signup screen for GitHub Pages.</p>
              </div>
              <div id="signupAlert"></div>
              <form id="signupForm">
                <div class="mb-3">
                  <label class="form-label small mb-1">Full name</label>
                  <input type="text" name="name" class="form-control form-control-lg" required>
                </div>
                <div class="mb-3">
                  <label class="form-label small mb-1">Email</label>
                  <input type="email" name="email" class="form-control form-control-lg" required>
                </div>
                <div class="mb-3">
                  <label class="form-label small mb-1">Password</label>
                  <input type="password" name="password" class="form-control form-control-lg" required>
                </div>
                <div class="mb-3">
                  <label class="form-label small mb-1">Confirm password</label>
                  <input type="password" name="confirm_password" class="form-control form-control-lg" required>
                </div>
                <div class="mb-3">
                  <label class="form-label small mb-2">Sign up as</label>
                  <div class="d-flex gap-3">
                    <label class="role-tile">
                      <input type="radio" name="role" value="user" checked>
                      <span class="tile-body">
                        <i class="fa-solid fa-user"></i>
                        <span>Tenant</span>
                      </span>
                    </label>
                    <label class="role-tile">
                      <input type="radio" name="role" value="owner">
                      <span class="tile-body">
                        <i class="fa-solid fa-house"></i>
                        <span>Owner</span>
                      </span>
                    </label>
                  </div>
                </div>
                <button type="submit" class="btn btn-gradient w-100 py-2 mb-2">Create account</button>
              </form>
              <div class="text-center mt-2">
                <p class="small mb-0">Already have an account? <a href="./login.html" class="fw-semibold">Sign in</a></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="./app.js"></script>
</body>
</html>
